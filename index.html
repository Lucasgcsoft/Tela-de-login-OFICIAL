<!DOCTYPE html>
<!-- 
  DOCTYPE html: diz ao navegador que este é um documento HTML5
-->

<html lang="pt-BR">
<!--
  <html>: elemento raiz da página
  lang="pt-BR": define o idioma da página como Português Brasileiro
-->

<head>
  <!-- 
    <head>: área de configurações da página (não aparece visualmente)
    Aqui ficam: título, fontes, estilos, metadados
  -->

  <meta charset="UTF-8">
  <!-- charset="UTF-8": aceita letras com acentos (á, ç, ã...) -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- viewport: faz o site funcionar bem no celular (responsivo) -->

  <title>Login — Minha Conta</title>
  <!-- <title>: texto que aparece na aba do navegador -->

  <!-- Importando uma fonte do Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* 
      ==========================================
      CSS — Cascading Style Sheets
      É a "maquiagem" da página. Define cores, 
      tamanhos, posições, animações...
      ==========================================
    */

    /* 
      :root — variáveis globais de CSS.
      Definimos as cores principais aqui para 
      reutilizá-las em todo o arquivo.
    */
    :root {
      --bg: #0d0d0d;          /* cor do fundo principal */
      --card: #161616;        /* cor do cartão de login */
      --border: #2a2a2a;      /* cor das bordas */
      --accent: #ADD8E6;      /* cor de destaque (azul bebe) */
      --text: #f0ece4;        /* cor do texto principal */
      --muted: #6b6762;       /* cor do texto secundário */
      --input-bg: #1e1e1e;    /* cor de fundo dos inputs */
      --error: #e07070;       /* cor de erros */
    }

    /* 
      * — seleciona TODOS os elementos da página.
      box-sizing: inclui padding e border no cálculo do tamanho.
    */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Estilo do <body>, o "corpo" da página */
    body {
      background-color: var(--bg);       /* usa a variável --bg */
      color: var(--text);                /* cor padrão do texto */
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;                 /* ocupa 100% da altura da tela */
      display: flex;                     /* ativa o Flexbox */
      align-items: center;              /* centraliza verticalmente */
      justify-content: center;          /* centraliza horizontalmente */
      padding: 24px;
    }

    /* 
      .container — classe CSS (começa com ponto).
      Usada para agrupar e organizar elementos.
    */
    .container {
      width: 100%;
      max-width: 440px;       /* largura máxima do formulário */
    }

    /* Cabeçalho com logo/marca */
    .brand {
      text-align: center;
      margin-bottom: 40px;
    }

    /* 
      O ícone da marca — criado só com CSS!
      Sem precisar de imagem.
    */
    .brand-icon {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 12px;              /* bordas arredondadas */
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .brand p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* O cartão branco/escuro que contém o formulário */
    .card {
      background: var(--card);
      border: 1px solid var(--border);  /* borda fina */
      border-radius: 16px;
      padding: 36px;

      /* Sombra para dar profundidade */
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    /* 
      Grupo de campo: label + input juntos.
      margin-bottom cria espaço entre os grupos.
    */
    .field-group {
      margin-bottom: 20px;
    }

    /* 
      <label> — rótulo de um campo de formulário.
      Ao clicar no label, o input correspondente é focado.
    */
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;        /* texto em maiúsculas */
      margin-bottom: 8px;
    }

    /* 
      <input> — campo de texto onde o usuário digita.
      width: 100% faz ele ocupar toda a largura disponível.
    */
    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;                    /* remove o contorno padrão do browser */
      transition: border-color 0.2s;   /* animação suave ao focar */
    }

    /* :focus — estilos quando o input está selecionado/ativo */
    input:focus {
      border-color: var(--accent);
    }

    /* Campo de senha tem padding extra à direita para o ícone */
    .password-wrapper {
      position: relative;              /* permite posicionar o ícone dentro */
    }

    .password-wrapper input {
      padding-right: 44px;
    }

    /* Botão de mostrar/esconder senha */
    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);    /* centraliza verticalmente */
      background: none;
      border: none;
      cursor: pointer;               /* muda o cursor para mãozinha */
      color: var(--muted);
      font-size: 16px;
      padding: 4px;
    }

    .toggle-password:hover {
      color: var(--text);
    }

    /* Linha com "lembrar-me" e "esqueci a senha" */
    .row {
      display: flex;
      justify-content: space-between; /* coloca itens nas extremidades */
      align-items: center;
      margin-bottom: 28px;
    }

    /* Checkbox de "lembrar-me" */
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;                       /* espaço entre o checkbox e o texto */
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);    /* cor do checkbox marcado */
    }

    /* Link de "esqueci a senha" */
    .forgot {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;          /* remove o sublinhado padrão */
      transition: opacity 0.2s;
    }

    .forgot:hover {
      opacity: 0.7;                   /* fica mais transparente ao passar o mouse */
    }

    /* 
      <button> — botão de envio do formulário.
      Este é o elemento principal de ação da página.
    */
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;  /* animações suaves */
      letter-spacing: 0.02em;
    }

    /* Efeito hover (quando o mouse está sobre o botão) */
    .btn-primary:hover {
      opacity: 0.9;
    }

    /* Efeito active (quando o usuário clica) */
    .btn-primary:active {
      transform: scale(0.98);         /* encolhe levemente para dar feedback */
    }

    /* Separador "— ou —" */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';                    /* pseudo-elementos precisam de content */
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Botão secundário (Google, por exemplo) */
    .btn-secondary {
      width: 100%;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      padding: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: rgba(200, 169, 110, 0.05);
    }

    /* Rodapé do card: link para cadastro */
    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Mensagem de erro (visível via JavaScript) */
    .error-msg {
      background: rgba(224, 112, 112, 0.1);
      border: 1px solid rgba(224, 112, 112, 0.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 20px;

      /* Começa escondida */
      display: none;
    }

    .error-msg.visible {
      display: block;                /* aparece quando a classe 'visible' é adicionada */
    }

    /* Animação de entrada do card */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);  /* começa 20px abaixo */
      }
      to {
        opacity: 1;
        transform: translateY(0);     /* termina na posição normal */
      }
    }

    .card {
      animation: slideUp 0.5s ease forwards;
    }

    .brand {
      animation: slideUp 0.4s ease forwards;
    }
  </style>
</head>

<body>

  <!-- 
    <body>: o "corpo" da página — tudo que aparece na tela fica aqui.
  -->

  <div class="container">
    <!-- Marca/Logo -->
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <h1>Minha Conta</h1>
      <p>Bem-vindo de volta</p>
    </div>

    <!-- 
      Cartão principal do formulário 
    -->
    <div class="card">
      
      <!-- 
        Mensagem de erro — começa oculta.
        O JavaScript vai mostrá-la se o login falhar.
      -->
      <div class="error-msg" id="errorMsg">
        E-mail ou senha incorretos. Tente novamente.
      </div>

      <!-- 
        Campo de E-mail 
        for="email" no label e id="email" no input os conectam
      -->
      <div class="field-group">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          placeholder="seu@email.com"
          autocomplete="email"
        >
        <!-- 
          type="email": o browser valida automaticamente se é um e-mail
          placeholder: texto de dica que some quando o usuário digita
          autocomplete: sugere e-mails salvos no browser
        -->
      </div>

      <!-- Campo de Senha -->
      <div class="field-group">
        <label for="password">Senha</label>
        <div class="password-wrapper">
          <input 
            type="password" 
            id="password" 
            placeholder="••••••••"
            autocomplete="current-password"
          >
          <!-- type="password": esconde os caracteres digitados -->
          
          <!-- Botão para mostrar/esconder senha -->
          <button 
            class="toggle-password" 
            onclick="togglePassword()" 
            type="button"
            title="Mostrar senha"
          >
            👁
          </button>
        </div>
      </div>

      <!-- Linha: lembrar-me + esqueci a senha -->
      <div class="row">
        <label class="remember">
          <input type="checkbox" id="remember">
          Lembrar-me
        </label>
        <a href="#" class="forgot">Esqueci a senha</a>
      </div>

      <!-- 
        Botão de Login
        onclick="handleLogin()" chama a função JavaScript quando clicado
      -->
      <button class="btn-primary" onclick="handleLogin()">
        Entrar
      </button>

      <!-- Separador visual -->
      <div class="divider">ou</div>

      <!-- Botão alternativo (ex: Google) -->
      <button class="btn-secondary" onclick="alert('Login com Google em breve!')">
        <span>G</span>
        Continuar com Google
      </button>

      <!-- Link para cadastro -->
      <div class="card-footer">
        Não tem uma conta? <a href="#">Cadastre-se</a>
      </div>
    </div>
  </div>

  <script>
    /*
      ==========================================
      JAVASCRIPT — a "inteligência" da página.
      Enquanto HTML é a estrutura e CSS é o estilo,
      o JavaScript faz as coisas acontecerem.
      ==========================================
    */

    // Credenciais de teste (em um site real, isso fica no servidor!)
    const USUARIO_VALIDO = {
      email: "teste@email.com",
      senha: "123456"
    };

    /*
      Função chamada quando o usuário clica em "Entrar"
      function = define uma função reutilizável
    */
    function handleLogin() {
      // Pegamos os valores digitados pelo usuário
      // getElementById() busca um elemento pelo seu id=""
      // .value pega o texto digitado dentro do input
      const email = document.getElementById('email').value;
      const senha = document.getElementById('password').value;

      // Validação simples: campos não podem estar vazios
      if (email === '' || senha === '') {
        mostrarErro('Preencha todos os campos.');
        return; // 'return' interrompe a função aqui
      }

      // Verifica se e-mail e senha estão corretos
      if (email === USUARIO_VALIDO.email && senha === USUARIO_VALIDO.senha) {
        // Login correto!
        alert('✅ Login realizado com sucesso!\n\nE-mail: ' + email);
        esconderErro(); // esconde qualquer erro anterior
      } else {
        // Login incorreto — mostra a mensagem de erro
        mostrarErro('E-mail ou senha incorretos. Tente novamente.');
      }
    }

    /*
      Função para mostrar a mensagem de erro
      Adiciona a classe CSS 'visible' ao elemento
    */
    function mostrarErro(mensagem) {
      const errEl = document.getElementById('errorMsg');
      errEl.textContent = mensagem;  // define o texto da mensagem
      errEl.classList.add('visible'); // adiciona a classe 'visible'
    }

    /*
      Função para esconder a mensagem de erro
    */
    function esconderErro() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    /*
      Função que alterna entre mostrar e esconder a senha
    */
    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.querySelector('.toggle-password');

      // Se o tipo for 'password' (escondida), muda para 'text' (visível)
      // O operador ternário: condição ? valor_se_true : valor_se_false
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    /*
      Permite pressionar ENTER para fazer login.
      'keydown' é o evento acionado quando uma tecla é pressionada.
    */
    document.addEventListener('keydown', function(evento) {
      if (evento.key === 'Enter') {  // se a tecla for ENTER
        handleLogin();
      }
    });
  </script>

</body>
</html>
